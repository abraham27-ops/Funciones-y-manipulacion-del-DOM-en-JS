<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas Abraham</title>

    <!-- link de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Link de Css -->
    <link rel="stylesheet" href="Css/style.css">
</head>

<body>

    <!-- Main -->
    <main class="container py-5">
        <section class="card shadow border-0 rounded-4 mx-auto" style="max-width: 800px;">
            <div class="card-body p-4">
                <h1 class="text-center mb-2">Lista de Tareas</h1>
                <p class="text-center text-muted mb-4">Agrega Tareas, marca las que completes y elimina las que ya no
                    necesites.</p>
                <div class="row g-3 mb-4">
                    <input type="text" id="txtTarea" class="form-control" placeholder="Escribe una tarea">
                    <div class="col-12 col-md-3">
                        <select id="prioridad" class="form-select">
                            <option value="" selected disabled hidden>Prioridad</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3 d-grid">
                        <button id="btnAgregar" class="btn btn-info-subtle">
                            Agregar
                        </button>
                    </div>
                </div>
                <div class="d-flex flex-column gap-3">
                    <!-- Aqui se agregaran las tareas con Js -->
                </div>
                <p id="contador" class="text-center fw-bold text-secondary mt-4">
                    Tareas registradas: 0
                </p>
            </div>
        </section>
    </main>

    <!-- Script de SweetAlert -->
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Script de Js -->
    <script src="Js/controllers/index.controller.js"></script>
</body>

</html>
